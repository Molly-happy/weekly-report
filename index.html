    function getDefaultData() {
        const d = {};
        [...bwSales, ...pcSales, ...bwKeyPack, ...pcKeyPack, ...execBWStore, ...execPCStore, ...execSmallBW, ...execSmallPC, ...execNewChannel].forEach(k => {
            d[k.id] = { target: 100, actual: Math.floor(Math.random()*60+40), achieve: Math.random()*0.6+0.4 };
        });
        return d;
    }
    let kpiData = getDefaultData();
    function generateAct() { return kpiData; }
    function getKpi(repId, kpiId) { return generateAct()[kpiId] || { target:100, actual:0, achieve:0 }; }
    function getGroupAchieve(repId, group) { if (group.noData) return { target:0, actual:0, achieve:0 }; const data = generateAct(); let t=0,a=0; group.kpis.forEach(k => { const d = data[k.id] || {target:100,actual:0}; t+=d.target; a+=d.actual; }); return {target:t, actual:a, achieve:t>0?a/t:0}; }

    let issueStore = {}; REPS.forEach(r => issueStore[r.id] = {});

    function drawMicroRing(ctx, percent, color) {
        const cx=30, cy=30, r=25;
        ctx.clearRect(0,0,60,60);
        ctx.beginPath(); ctx.arc(cx,cy,r,0,2*Math.PI); ctx.strokeStyle='#e6ecf5'; ctx.lineWidth=5; ctx.stroke();
        ctx.beginPath(); ctx.arc(cx,cy,r,-0.5*Math.PI,-0.5*Math.PI+2*Math.PI*Math.min(percent,1)); ctx.strokeStyle=color; ctx.lineWidth=5; ctx.lineCap='round'; ctx.stroke();
        ctx.font='bold 12px Inter'; ctx.fillStyle='#0a1e3c'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(Math.round(percent*100)+'%', cx, cy);
    }
    function showToast(text, bg='#2e7d32') { const t=document.getElementById('toast'); t.textContent=text; t.style.background=bg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

    async function loadDataFromVika() {
        try {
            const resp = await fetch(API_BASE + '?pageSize=100', { headers: { 'Authorization': `Bearer ${VIKA_TOKEN}` } });
            if (!resp.ok) throw new Error('HTTP '+resp.status);
            const data = await resp.json();
            if (data.success && data.data.records) {
                data.data.records.forEach(rec => {
                    const f = rec.fields, name = f['姓名'], week = f['周次'];
                    if (name && week === CURRENT_WEEK) {
                        if (!issueStore[name]) issueStore[name] = {};
                        allGroupsForForm.forEach(g => { issueStore[name][g.groupId] = { issue: f[g.groupId+'_问题']||'', solution: f[g.groupId+'_方案']||'' }; });
                        submitStatus[name] = f['提交状态'] === 'true';
                    }
                });
            }
            saveStatus.textContent = '💾 云端数据已加载';
        } catch (err) { saveStatus.textContent = '⚠️ 离线模式（本地数据）'; }
    }
    async function saveToVika(repId, markSubmitted) {
        const fields = { '姓名': repId, '周次': CURRENT_WEEK, '提交状态': markSubmitted ? 'true' : 'false' };
        allGroupsForForm.forEach(g => {
            const s = issueStore[repId]?.[g.groupId] || { issue:'', solution:'' };
            fields[g.groupId+'_问题'] = s.issue; fields[g.groupId+'_方案'] = s.solution;
        });
        const query = API_BASE + '?filterByFormula=' + encodeURIComponent(`AND({姓名}="${repId}",{周次}="${CURRENT_WEEK}")`);
        const existResp = await fetch(query, { headers: { 'Authorization': `Bearer ${VIKA_TOKEN}` } });
        const existData = await existResp.json();
        if (existData.success && existData.data.records.length > 0) {
            const rid = existData.data.records[0].recordId;
            await fetch(API_BASE + '?fieldKey=name', { method:'PATCH', headers: { 'Authorization': `Bearer ${VIKA_TOKEN}`, 'Content-Type':'application/json' }, body: JSON.stringify({ records:[{ recordId:rid, fields }] }) });
        } else {
            await fetch(API_BASE + '?fieldKey=name', { method:'POST', headers: { 'Authorization': `Bearer ${VIKA_TOKEN}`, 'Content-Type':'application/json' }, body: JSON.stringify({ records:[{ fields }] }) });
        }
        submitStatus[repId] = markSubmitted;
    }

        html += '</div></div></div>';
        html += '</div>';
        // 新兴渠道
        html += '<div class="exec-row"><div class="exec-block"><div class="exec-block-title">新兴渠道</div><div class="horizontal-row">';
        execNewChannel.forEach(k => html += `<div class="micro-ring-item"><canvas id="ring_${repId}_${k.id}" class="micro-ring-canvas" width="60" height="60"></canvas><div class="micro-ring-name">${k.name}</div></div>`);
        html += '</div></div></div></div>';

        const missing = allGroupsForForm.filter(g => { const gd = store[g.groupId]||{issue:'',solution:''}; return !gd.issue.trim()||!gd.solution.trim(); });
        if (missing.length) html += '<div class="reminder-card"><span>⚠️ 未填写：</span>'+missing.map(mg=>`<span class="reminder-badge" data-groupid="${mg.groupId}">${mg.groupName}</span>`).join('')+'</div>';

        html += '<h3 style="margin:20px 0;">📝 问题与方案</h3>';
        allGroupsForForm.forEach(g => {
            const gd = store[g.groupId]||{issue:'',solution:''};
            html += `<div class="group-detail-card" id="${g.groupId}"><div class="group-detail-header" style="border-left-color:${g.color||'#1e88e5'};">${g.groupName}</div>`;
            if (!g.noData) {
                html += '<div class="sub-items-row">';
                g.kpis.forEach(k => {
                    const kd = getKpi(repId, k.id) || {target:100,actual:0,achieve:0};
                    const ach = Math.round(kd.achieve*100);
                    html += `<div class="sub-item"><span class="sub-item-name">${k.name||k.sub||''}</span><div class="progress-container"><span class="progress-label">目标 ${kd.target}</span><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${Math.min(ach,100)}%; background:${g.color||'#1e88e5'};"></div></div><span class="progress-value">达成 ${kd.actual} (${ach}%)</span></div></div>`;
                });
                html += '</div>';
            }
            html += `<textarea class="group-textarea-box" data-groupid="${g.groupId}" placeholder="请填写问题及改进方案">${gd.issue?gd.issue+'\n\n---改进方案---\n'+gd.solution:''}</textarea></div>`;
        });
        dynamicContent.innerHTML = html;

        [bwSales, pcSales, bwKeyPack, pcKeyPack, execBWStore, execPCStore, execSmallBW, execSmallPC, execNewChannel].flat().forEach(k => {
            const c=document.getElementById(`ring_${repId}_${k.id}`);
            if(c) drawMicroRing(c.getContext('2d'), getKpi(repId,k.id).achieve, '#1e88e5');
        });
        document.querySelectorAll('.reminder-badge').forEach(b=>b.onclick=()=>document.getElementById(b.dataset.groupid)?.scrollIntoView({behavior:'smooth',block:'center'}));
        document.getElementById('saveDraftBtn').style.display='inline-block';
        document.getElementById('backToTeamBtn').style.display='none';
    }

    function renderDirectorView() {
        let html = '<div class="section-card"><div style="padding:20px 28px;">📋 北区总监 · 申毅 · 团队总览</div><div class="freeze-wrapper"><table class="data-table"><thead><tr><th>SM团队</th>';
        allGroupsForForm.forEach(g => html += `<th>${g.groupName}</th>`);
        html += '</tr></thead><tbody><tr class="north-summary"><td>📊 北区达成</td>';
        allGroupsForForm.forEach(g => {
            if (g.noData) { html += '<td></td>'; return; }
            let tt=0,ta=0; REPS.forEach(r => { const {target,actual}=getGroupAchieve(r.id,g); tt+=target; ta+=actual; });
            const na = tt>0 ? Math.round((ta/tt)*100) : 0;
            html += `<td><div class="progress-wrapper"><div class="progress-track"><div class="progress-fill" style="width:${Math.min(na,100)}%;"></div></div><span>${na}%</span></div></td>`;
        });
        html += '</tr>';
        MANAGERS.forEach(sm => {
            const subs = REPS.filter(r=>r.managerId===sm.id);
            html += `<tr><td><span class="sm-link" data-sm-id="${sm.id}">SM-${sm.name} · ${sm.team}</span></td>`;
            allGroupsForForm.forEach(g => {
                if (g.noData) { html += '<td></td>'; return; }
                let gt=0,ga=0; subs.forEach(r => { const {target,actual}=getGroupAchieve(r.id,g); gt+=target; ga+=actual; });
                const ga2 = gt>0 ? Math.round((ga/gt)*100) : 0;
                html += `<td><div class="progress-wrapper"><div class="progress-track"><div class="progress-fill" style="width:${Math.min(ga2,100)}%;"></div></div><span>${ga2}%</span></div></td>`;
            });
            html += '</tr>';
        });
        html += '</tbody></table></div></div>';
        dynamicContent.innerHTML = html;
        document.querySelectorAll('.sm-link').forEach(el=>el.addEventListener('click', e=>{
            currentUserId = e.target.dataset.smId; viewMode='manager'; viewingSubordinateId=null; showLevel1=false; updateUI();
        }));
        document.getElementById('saveDraftBtn').style.display='none';
    }

    function renderManagerView(mId) {
        const sm = MANAGERS.find(m=>m.id===mId); const subs = REPS.filter(r=>r.managerId===mId);
        let html = `<div class="section-card"><div style="padding:20px 28px; display:flex;"><span style="font-weight:700;font-size:20px;">📋 SM-${sm.name} · ${sm.team}</span><button class="toggle-btn" id="toggleLevelBtn">${showLevel1?'显示汇总':'显示明细'}</button></div><div class="freeze-wrapper"><table class="data-table"><thead><tr><th>AKDM</th><th>省份</th>`;
        if (showLevel1) allGroupsForForm.forEach(g => html += `<th>${g.groupName}</th>`);
        else allGroupsForForm.forEach(g => html += `<th>${g.groupName}</th>`);
        html += '<th>提交</th></tr><tr class="team-summary"><td colspan="2">📊 团队合计</td>';
        if (showLevel1) { allGroupsForForm.forEach(g => { let st=0,sa=0; subs.forEach(r=>{ const {target,actual}=getGroupAchieve(r.id,g); st+=target; sa+=actual; }); const ach=st>0?Math.round((sa/st)*100):0; html += `<td><div class="progress-wrapper"><div class="progress-track"><div class="progress-fill" style="width:${Math.min(ach,100)}%;"></div></div><span>${ach}%</span></div></td>`; }); }
        else { allGroupsForForm.forEach(g => { let st=0,sa=0; subs.forEach(r=>{ const {target,actual}=getGroupAchieve(r.id,g); st+=target; sa+=actual; }); const ach=st>0?Math.round((sa/st)*100):0; html += `<td><div class="progress-wrapper"><div class="progress-track"><div class="progress-fill" style="width:${Math.min(ach,100)}%;"></div></div><span>${ach}%</span></div></td>`; }); }
        html += '<td></td></tr></thead><tbody>';
        subs.forEach(rep => {
            const subm = submitStatus[rep.id]||false;
            html += `<tr class="${subm?'':'row-pending'}"><td><span class="rep-link" data-repid="${rep.id}">AKDM-${rep.name}</span></td><td>${rep.province}</td>`;
            if (showLevel1) { allGroupsForForm.forEach(g => { if (g.noData) { html += '<td></td>'; return; } const data=generateAct(); let cell='<div class="level1-detail">'; g.kpis.forEach(k=>{ const kd=data[k.id]||{target:100,actual:0,achieve:0}; const ach=Math.round(kd.achieve*100); cell += `<div class="level1-item"><span>${k.name||k.sub||''}</span><div class="progress-track" style="width:50px;height:6px;"><div class="progress-fill" style="width:${Math.min(ach,100)}%;"></div></div><span>${ach}%</span></div>`; }); cell+='</div>'; html += `<td>${cell}</td>`; }); }
            else { allGroupsForForm.forEach(g => { if (g.noData) { html += '<td></td>'; return; } const {achieve}=getGroupAchieve(rep.id,g); const ach=Math.round(achieve*100); html += `<td><div class="progress-wrapper"><div class="progress-track"><div class="progress-fill" style="width:${Math.min(ach,100)}%;"></div></div><span>${ach}%</span></div></td>`; }); }
            html += `<td><span class="status-badge ${subm?'status-submitted':'status-pending'}">${subm?'已提交':'未提交'}</span></td></tr>`;
        });
        html += '</tbody></table></div></div>';
        dynamicContent.innerHTML = html;
        document.getElementById('toggleLevelBtn').addEventListener('click', ()=>{ showLevel1=!showLevel1; updateUI(); });
        document.querySelectorAll('.rep-link').forEach(el=>el.addEventListener('click', e=>viewSubordinate(e.target.dataset.repid)));
        document.getElementById('saveDraftBtn').style.display='none';
    }

    function renderAdminView() {
        let html = '<div class="section-card"><div style="padding:20px 28px;">📋 管理员 · 全员提交状态</div>';
        MANAGERS.forEach(sm => {
            const subs = REPS.filter(r=>r.managerId===sm.id);
            html += `<div><strong>👔 SM-${sm.name} · ${sm.team}</strong></div><div class="freeze-wrapper"><table class="data-table"><thead><tr><th>AKDM</th><th>省份</th><th>提交</th>`;
            allGroupsForForm.forEach(g => html += `<th>${g.groupName}</th>`);
            html += '</tr></thead><tbody>';
            subs.forEach(rep => {
                const subm = submitStatus[rep.id]||false;
                html += `<tr class="${subm?'':'row-pending'}"><td><span class="rep-link" data-repid="${rep.id}">AKDM-${rep.name}</span></td><td>${rep.province}</td><td><span class="status-badge ${subm?'status-submitted':'status-pending'}">${subm?'已提交':'未提交'}</span></td>`;
                allGroupsForForm.forEach(g => { if (g.noData) { html += '<td></td>'; return; } const {achieve}=getGroupAchieve(rep.id,g); html += `<td><div class="progress-wrapper"><div class="progress-track"><div class="progress-fill" style="width:${Math.min(achieve*100,100)}%;"></div></div><span>${Math.round(achieve*100)}%</span></div></td>`; });
                html += '</tr>';
            });
            html += '</tbody></table></div>';
        });
        html += '</div>';
        dynamicContent.innerHTML = html;
        document.querySelectorAll('.rep-link').forEach(el=>el.addEventListener('click', e=>viewSubordinate(e.target.dataset.repid)));
        document.getElementById('saveDraftBtn').style.display='none';
    }

    function viewSubordinate(repId) { viewingSubordinateId=repId; currentUserId=repId; viewMode='rep'; updateUI(); }
    async function saveCurrentInputs(markSubmitted=false) {
        const repId = viewingSubordinateId || (getCurrentUser()?.role==='rep'?currentUserId:null); if(!repId) return;
        document.querySelectorAll('.group-textarea-box').forEach(ta => {
            const gid = ta.dataset.groupid; const content = ta.value;
            if(!issueStore[repId]) issueStore[repId]={}; if(!issueStore[repId][gid]) issueStore[repId][gid]={issue:'',solution:''};
            const parts = content.split('\n\n---改进方案---\n');
            issueStore[repId][gid].issue = parts[0]||''; issueStore[repId][gid].solution = parts[1]||'';
        });
        try { await saveToVika(repId, markSubmitted); showToast(markSubmitted?'✅ 已提交至云端':'💾 已暂存至云端', markSubmitted?'#2e7d32':'#1565c0'); }
        catch(e) { showToast('❌ 保存失败，请重试','#d32f2f'); }
    }
    function updateUI() {
        const user = ALL_USERS.find(u=>u.id===currentUserId);
        roleDisplay.textContent = user.role==='director'?'🏢 总监':(user.role==='admin'?'🔐 管理员':(user.role==='manager'?'👔 SM':'🧑‍💼 AKDM'));
        if (user.role==='director') renderDirectorView();
        else if (user.role==='admin') renderAdminView();
        else if (user.role==='manager' && !viewingSubordinateId) renderManagerView(user.id);
        else { const rid=viewingSubordinateId||(user.role==='rep'?user.id:null); if(rid) renderRepDetailView(rid); }
        renderSelect();
    }
    function renderSelect() {
        userSelect.innerHTML = '';
        [DIRECTOR, ADMIN, ...MANAGERS, ...REPS].forEach(u => {
            const o = document.createElement('option'); o.value=u.id;
            if (u.role==='director') o.textContent=`🏢 北区总监-${u.name}`;
            else if (u.role==='admin') o.textContent='🔐 管理员';
            else if (u.role==='manager') o.textContent=`👔 SM-${u.name}`;
            else o.textContent=`🧑‍💼 AKDM-${u.name} · ${u.province}`;
            if (u.id===currentUserId && !viewingSubordinateId) o.selected=true;
            userSelect.appendChild(o);
        });
    }
    document.getElementById('userSelect').addEventListener('change', e => {
        currentUserId = e.target.value; viewingSubordinateId=null;
        viewMode = ALL_USERS.find(u=>u.id===currentUserId).role; showLevel1=false; updateUI();
    });
    document.getElementById('backToTeamBtn').addEventListener('click', ()=>{
        if (getCurrentUser().role==='manager') { viewingSubordinateId=null; viewMode='manager'; updateUI(); }
    });
    document.getElementById('resetToMyDataBtn').addEventListener('click', ()=>{
        const rid = viewingSubordinateId || (getCurrentUser()?.role==='rep'?currentUserId:null);
        if (rid && issueStore[rid]) Object.keys(issueStore[rid]).forEach(k=>issueStore[rid][k]={issue:'',solution:''});
        updateUI();
    });
    document.getElementById('saveAllBtn').addEventListener('click', ()=>saveCurrentInputs(true));
    document.getElementById('saveDraftBtn').addEventListener('click', ()=>saveCurrentInputs(false));
    dynamicContent.addEventListener('input', ()=>{ clearTimeout(window._st); window._st = setTimeout(()=>saveCurrentInputs(false), 800); });
    function getCurrentUser() { return ALL_USERS.find(u=>u.id===currentUserId); }
    async function init() { saveStatus.textContent='💾 正在加载云端数据...'; await loadDataFromVika(); renderSelect(); updateUI(); }
    init();
})();
</script>
</body>
</html>
