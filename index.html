                    perfect_facing: { target: 100, actual: Math.round(80 * factor), achieve: 0.8 * factor },
                    perfect_tcp: { target: 100, actual: Math.round(90 * factor), achieve: 0.9 * factor },
                    perfect_posm: { target: 100, actual: Math.round(75 * factor), achieve: 0.75 * factor },
                    perfect_rq: { target: 100, actual: Math.round(60 * factor), achieve: 0.6 * factor },
                    clear_action: { target: 100, actual: Math.round(105 * factor), achieve: 1.05 * factor },
                    clear_coverage: { target: 100, actual: Math.round(78 * factor), achieve: 0.78 * factor },
                    dove_launch: { target: 100, actual: Math.round(48 * factor), achieve: 0.48 * factor },
                    vsl_listing: { target: 100, actual: Math.round(91 * factor), achieve: 0.91 * factor },
                    vsl_image: { target: 30, actual: Math.round(8 * factor), achieve: 0.27 * factor }
                };
            }

            function generateAct(userId) {
                return { ...(realData[userId] || {}), ...getSimulatedOthers(userId) };
            }

            function getGroupAchieve(repId, group) {
                if (group.noData) return { target: 0, actual: 0, achieve: 0 };
                const data = generateAct(repId);
                let t = 0, a = 0;
                group.kpis.forEach(k => {
                    const d = data[k.id] || { target: 100, actual: 0 };
                    t += d.target;
                    a += d.actual;
                });
                return { target: t, actual: a, achieve: t > 0 ? a / t : 0 };
            }

            // 全局填写数据存储（从维格表加载）
            let issueStore = {};
            REPS.forEach(r => { issueStore[r.id] = {}; });

            // 绘图函数
            function drawRing(ctx, percent, color, groupName) {
                const cx = 35, cy = 35, r = 28;
                ctx.clearRect(0, 0, 70, 70);
                ctx.beginPath(); ctx.arc(cx, cy, r, 0, 2 * Math.PI); ctx.strokeStyle = '#e6ecf5'; ctx.lineWidth = 6; ctx.stroke();
                ctx.beginPath(); ctx.arc(cx, cy, r, -0.5 * Math.PI, -0.5 * Math.PI + 2 * Math.PI * Math.min(percent, 1)); ctx.strokeStyle = color; ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.stroke();
                let fs = 10; if (groupName.length > 6) fs = 8; if (groupName.length > 8) fs = 7;
                ctx.font = `bold ${fs}px Inter, sans-serif`; ctx.fillStyle = '#0a1e3c'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(groupName, cx, cy);
            }

            function getMissingGroups(repId) {
                const store = issueStore[repId] || {};
                return allGroups.filter(g => {
                    const gd = store[g.groupId] || { issue: '', solution: '' };
                    return !gd.issue.trim() || !gd.solution.trim();
                });
            }

            // ============ 维格表 API 操作 ============
            async function loadDataFromVika() {
                try {
                    const response = await fetch(API_BASE + '?pageSize=100', {
                        headers: { 'Authorization': `Bearer ${VIKA_TOKEN}` }
                    });
                    const data = await response.json();
                    if (data.success && data.data.records) {
                        data.data.records.forEach(record => {
                            const fields = record.fields;
                            const name = fields['姓名'];
                            const week = fields['周次'];
                            if (name && week === CURRENT_WEEK) {
                                if (!issueStore[name]) issueStore[name] = {};
                                allGroups.forEach(g => {
                                    issueStore[name][g.groupId] = {
                                        issue: fields[g.groupId + '_问题'] || '',
                                        solution: fields[g.groupId + '_方案'] || ''
                                    };
                                });
                                submitStatus[name] = fields['提交状态'] === 'true';
                            }
                        });
                    }
                    saveStatus.textContent = '💾 云端数据已加载';
                } catch (err) {
                    console.error('加载数据失败:', err);
                    saveStatus.textContent = '⚠️ 云端加载失败，使用本地数据';
                }
            }

            async function saveToVika(repId, markSubmitted) {
                try {
                    const fields = {
                        '姓名': repId,
                        '周次': CURRENT_WEEK,
                        '提交状态': markSubmitted ? 'true' : 'false'
                    };
                    allGroups.forEach(g => {
                        const store = issueStore[repId] && issueStore[repId][g.groupId] ? issueStore[repId][g.groupId] : { issue: '', solution: '' };
                        fields[g.groupId + '_问题'] = store.issue || '';
                        fields[g.groupId + '_方案'] = store.solution || '';
                    });

                    // 查找已有记录
                    const query = API_BASE + '?filterByFormula=' + encodeURIComponent(`AND({姓名}="${repId}",{周次}="${CURRENT_WEEK}")`);
                    const existingResp = await fetch(query, {
                        headers: { 'Authorization': `Bearer ${VIKA_TOKEN}` }
                    });
                    const existingData = await existingResp.json();
                    const existingRecords = existingData.success ? existingData.data.records : [];

                    if (existingRecords.length > 0) {
                        // 更新
                        const recordId = existingRecords[0].recordId;
                        await fetch(API_BASE + '?fieldKey=name', {
                            method: 'PATCH',
                            headers: { 'Authorization': `Bearer ${VIKA_TOKEN}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ records: [{ recordId: recordId, fields: fields }] })
                        });
                    } else {
                        // 新建
                        await fetch(API_BASE + '?fieldKey=name', {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${VIKA_TOKEN}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ records: [{ fields: fields }] })
                        });
                    }

                    if (markSubmitted) {
                        submitStatus[repId] = true;
                        saveStatus.textContent = '✅ 已提交至云端';
                    } else {
                        submitStatus[repId] = false;
                        saveStatus.textContent = '💾 已暂存至云端';
                    }
                } catch (err) {
                    console.error('保存失败:', err);
                    saveStatus.textContent = '⚠️ 云端保存失败，请重试';
                }
            }

            // ============ UI 渲染 ============
            function renderRepDetailView(repId) {
                const rep = REPS.find(r => r.id === repId) || ALL_USERS.find(u => u.id === repId);
                const store = issueStore[repId] || {};
                let html = '';
                html += '<div class="akdm-overview-layout">';
                html += '<div class="clear-block"><div class="block-title" style="color:#1e88e5;">清扬增长 +10%</div><div class="ring-grid">';
                level3Categories[0].groups.forEach(g => {
                    if (g.noData) return;
                    const ach = getGroupAchieve(repId, g);
                    html += `<div class="ring-card-h"><canvas id="ring_${repId}_${g.groupId}" class="ring-canvas-sm" width="70" height="70"></canvas><div class="ring-info"><strong>${Math.round(ach.achieve*100)}%</strong><span>目标：${ach.target.toFixed(0)}</span><br><span>达成：${ach.actual.toFixed(0)}</span></div></div>`;
                });
                html += '</div></div><div class="right-blocks">';
                const doveCat = level3Categories[1];
                html += `<div class="dove-block"><div class="block-title" style="color:#2e9a6e;">多芬 Dream & Debeers</div><div class="ring-grid">`;
                doveCat.groups.forEach(g => {
                    const ach = getGroupAchieve(repId, g);
                    html += `<div class="ring-card-h"><canvas id="ring_${repId}_${g.groupId}" class="ring-canvas-sm" width="70" height="70"></canvas><div class="ring-info"><strong>${Math.round(ach.achieve*100)}%</strong><span>目标：${ach.target.toFixed(0)}</span><br><span>达成：${ach.actual.toFixed(0)}</span></div></div>`;
                });
                html += '</div></div>';
                const vslCat = level3Categories[2];
                html += `<div class="vsl-block"><div class="block-title" style="color:#8e44ad;">VSL 夏季增量</div><div class="ring-grid">`;
                vslCat.groups.forEach(g => {
                    const ach = getGroupAchieve(repId, g);
                    html += `<div class="ring-card-h"><canvas id="ring_${repId}_${g.groupId}" class="ring-canvas-sm" width="70" height="70"></canvas><div class="ring-info"><strong>${Math.round(ach.achieve*100)}%</strong><span>目标：${ach.target.toFixed(0)}</span><br><span>达成：${ach.actual.toFixed(0)}</span></div></div>`;
                });
                html += '</div></div></div></div>';

                const missing = getMissingGroups(repId);
                if (missing.length > 0) {
                    html += `<div class="reminder-card"><span style="font-weight:600;color:#a15813;">⚠️ 以下指标尚未填写，点击跳转：</span>`;
                    missing.forEach(mg => {
                        html += `<span class="reminder-badge" data-groupid="${mg.groupId}">${mg.groupName}</span>`;
                    });
                    html += `</div>`;
                }

                html += '<h3 style="margin:20px 0 12px;">📝 问题与方案</h3>';
                level3Categories.forEach(l3 => {
                    l3.groups.forEach(g => {
                        const gd = store[g.groupId] || { issue: '', solution: '' };
                        html += `<div class="group-detail-card" id="${g.groupId}"><div class="group-detail-header" style="border-left-color: ${l3.color};">${g.groupName}</div>`;
                        if (!g.noData) {
                            html += '<div class="sub-items-row">';
                            const data = generateAct(repId);
                            g.kpis.forEach(k => {
                                const kd = data[k.id] || { target: 100, actual: 0, achieve: 0 };
                                const achieve = Math.round(kd.achieve * 100);
                                html += `<div class="sub-item"><span class="sub-item-name">${k.name}</span><div class="progress-container"><span class="progress-label">目标 ${kd.target.toFixed(0)}</span><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${Math.min(achieve,100)}%; background:${l3.color};"></div></div><span class="progress-value">达成 ${kd.actual.toFixed(0)} (${achieve}%)</span></div></div>`;
                            });
                            html += '</div>';
                        }
                        html += `<textarea class="group-textarea-box" data-groupid="${g.groupId}" placeholder="请填写问题及改进方案">${gd.issue ? gd.issue + '\n\n---改进方案---\n' + gd.solution : ''}</textarea></div>`;
                    });
                });
                dynamicContent.innerHTML = html;

                allGroups.forEach(g => {
                    if (g.noData) return;
                    const c = document.getElementById(`ring_${repId}_${g.groupId}`);
                    if (c) drawRing(c.getContext('2d'), getGroupAchieve(repId, g).achieve, level3Categories.find(l => l.groups.some(gg => gg.groupId === g.groupId)).color, g.groupName);
                });

                document.querySelectorAll('.reminder-badge').forEach(badge => {
                    badge.addEventListener('click', function(e) {
                        const groupId = this.dataset.groupid;
                        const target = document.getElementById(groupId);
                        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    });
                });
                document.getElementById('saveDraftBtn').style.display = 'inline-block';
                document.getElementById('backToTeamBtn').style.display = 'none';
            }

            function renderDirectorView() {
                let html = '<div class="section-card"><div style="padding:20px 28px;">📋 北区总监 · 申毅 · 团队总览</div><div class="freeze-wrapper"><table class="data-table"><thead><tr><th>SM团队</th>';
                allGroups.forEach(g => html += `<th>${g.groupName}</th>`);
                html += '</tr></thead><tbody>';
                html += '<tr class="north-summary"><td>📊 北区达成</td>';
                allGroups.forEach(g => {
                    if (g.noData) { html += '<td></td>'; return; }
                    let totalTarget = 0, totalActual = 0;
                    REPS.forEach(r => {
                        const { target, actual } = getGroupAchieve(r.id, g);
                        totalTarget += target;
                        totalActual += actual;
                    });
                    const northAch = totalTarget > 0 ? Math.round((totalActual / totalTarget) * 100) : 0;
                    html += `<td><div class="progress-wrapper"><div class="progress-track"><div class="progress-fill" style="width:${Math.min(northAch,100)}%;"></div></div><span>${northAch}%</span></div></td>`;
                });
                html += '</tr>';
                MANAGERS.forEach(sm => {
                    const subs = REPS.filter(r => r.managerId === sm.id);
                    html += `<tr><td><span class="sm-link" data-sm-id="${sm.id}">SM-${sm.name} · ${sm.team}</span></td>`;
                    allGroups.forEach(g => {
                        if (g.noData) { html += '<td></td>'; return; }
                        let gt = 0, ga = 0;
                        subs.forEach(r => { const { target, actual } = getGroupAchieve(r.id, g); gt += target; ga += actual; });
                        const gAch = gt > 0 ? Math.round((ga / gt) * 100) : 0;
                        html += `<td><div class="progress-wrapper"><div class="progress-track"><div class="progress-fill" style="width:${Math.min(gAch,100)}%;"></div></div><span>${gAch}%</span></div></td>`;
                    });
                    html += '</tr>';
                });
                html += '</tbody></table></div></div>';
                dynamicContent.innerHTML = html;
                document.querySelectorAll('.sm-link').forEach(el => el.addEventListener('click', e => {
                    currentUserId = e.target.dataset.smId; viewMode = 'manager'; viewingSubordinateId = null; showLevel1 = false; updateUI();
                }));
                document.getElementById('saveDraftBtn').style.display = 'none';
                document.getElementById('backToTeamBtn').style.display = 'none';
            }

            function renderManagerView(mId) {
                const sm = MANAGERS.find(m => m.id === mId);
                const subs = REPS.filter(r => r.managerId === mId);
                let html = `<div class="section-card"><div style="padding:20px 28px; display:flex;"><span style="font-weight:700;font-size:20px;">📋 SM-${sm.name} · ${sm.team}</span><button class="toggle-btn" id="toggleLevelBtn">${showLevel1?'显示汇总':'显示明细'}</button></div><div class="freeze-wrapper"><table class="data-table"><thead><tr><th>AKDM</th><th>省份</th>`;
                if (showLevel1) allGroups.forEach(g => html += `<th>${g.groupName}</th>`);
                else allGroups.forEach(g => html += `<th>${g.groupName}</th>`);
                html += '<th>提交</th></tr>';
                html += '<tr class="team-summary"><td colspan="2">📊 团队合计</td>';
                if (showLevel1) {
                    allGroups.forEach(g => {
                        let st = 0, sa = 0;
                        subs.forEach(r => { const { target, actual } = getGroupAchieve(r.id, g); st += target; sa += actual; });
                        const ach = st > 0 ? Math.round((sa / st) * 100) : 0;
                        html += `<td><div class="progress-wrapper"><div class="progress-track"><div class="progress-fill" style="width:${Math.min(ach,100)}%;"></div></div><span>${ach}%</span></div></td>`;
                    });
                } else {
                    allGroups.forEach(g => {
                        let st = 0, sa = 0;
                        subs.forEach(r => { const { target, actual } = getGroupAchieve(r.id, g); st += target; sa += actual; });
                        const ach = st > 0 ? Math.round((sa / st) * 100) : 0;
                        html += `<td><div class="progress-wrapper"><div class="progress-track"><div class="progress-fill" style="width:${Math.min(ach,100)}%;"></div></div><span>${ach}%</span></div></td>`;
                    });
                }
                html += '<td></td></tr></thead><tbody>';
                subs.forEach(rep => {
                    const subm = submitStatus[rep.id] || false;
                    html += `<tr class="${subm?'':'row-pending'}"><td><span class="rep-link" data-repid="${rep.id}">AKDM-${rep.name}</span></td><td>${rep.province}</td>`;
                    if (showLevel1) {
                        allGroups.forEach(g => {
                            if (g.noData) { html += '<td></td>'; return; }
                            const data = generateAct(rep.id);
                            let cell = '<div class="level1-detail">';
                            g.kpis.forEach(k => {
                                const kd = data[k.id] || { target: 100, actual: 0, achieve: 0 };
                                const ach = Math.round(kd.achieve * 100);
                                cell += `<div class="level1-item"><span style="font-weight:500;min-width:50px;">${k.name}</span><div class="progress-track" style="width:50px;height:6px;"><div class="progress-fill" style="width:${Math.min(ach,100)}%;height:6px;"></div></div><span>${ach}%</span></div>`;
                            });
                            cell += '</div>'; html += `<td>${cell}</td>`;
                        });
                    } else {
                        allGroups.forEach(g => {
                            if (g.noData) { html += '<td></td>'; return; }
                            const { achieve } = getGroupAchieve(rep.id, g);
                            const ach = Math.round(achieve * 100);
                            html += `<td><div class="progress-wrapper"><div class="progress-track"><div class="progress-fill" style="width:${Math.min(ach,100)}%;"></div></div><span>${ach}%</span></div></td>`;
                        });
                    }
                    html += `<td><span class="status-badge ${subm?'status-submitted':'status-pending'}">${subm?'已提交':'未提交'}</span></td></tr>`;
                });
                html += '</tbody></table></div></div>';
                dynamicContent.innerHTML = html;
                document.getElementById('toggleLevelBtn').addEventListener('click', () => { showLevel1 = !showLevel1; updateUI(); });
                document.querySelectorAll('.rep-link').forEach(el => el.addEventListener('click', e => {
                    viewSubordinate(e.target.dataset.repid);
                }));
                document.getElementById('saveDraftBtn').style.display = 'none';
                document.getElementById('backToTeamBtn').style.display = 'none';
            }

            function renderAdminView() {
                let html = '<div class="section-card"><div style="padding:20px 28px;">📋 管理员 · 全员提交状态</div>';
                MANAGERS.forEach(sm => {
                    const subs = REPS.filter(r => r.managerId === sm.id);
                    html += `<div style="padding:0 20px 12px;"><strong>👔 SM-${sm.name} · ${sm.team}</strong></div><div class="freeze-wrapper"><table class="data-table"><thead><tr><th>AKDM</th><th>省份</th><th>提交</th>`;
                    allGroups.forEach(g => html += `<th>${g.groupName}</th>`);
                    html += '</tr></thead><tbody>';
                    subs.forEach(rep => {
                        const subm = submitStatus[rep.id] || false;
                        html += `<tr class="${subm?'':'row-pending'}"><td><span class="rep-link" data-repid="${rep.id}">AKDM-${rep.name}</span></td><td>${rep.province}</td><td><span class="status-badge ${subm?'status-submitted':'status-pending'}">${subm?'已提交':'未提交'}</span></td>`;
                        allGroups.forEach(g => {
                            if (g.noData) { html += '<td></td>'; return; }
                            const { achieve } = getGroupAchieve(rep.id, g);
                            html += `<td><div class="progress-wrapper"><div class="progress-track"><div class="progress-fill" style="width:${Math.min(achieve*100,100)}%;"></div></div><span>${Math.round(achieve*100)}%</span></div></td>`;
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table></div>';
                });
                html += '</div>';
                dynamicContent.innerHTML = html;
                document.querySelectorAll('.rep-link').forEach(el => el.addEventListener('click', e => {
                    viewSubordinate(e.target.dataset.repid);
                }));
                document.getElementById('saveDraftBtn').style.display = 'none';
                document.getElementById('backToTeamBtn').style.display = 'none';
            }

            function viewSubordinate(repId) { viewingSubordinateId = repId; currentUserId = repId; viewMode = 'rep'; updateUI(); }

            async function saveCurrentInputs(markSubmitted = false) {
                const repId = viewingSubordinateId || (getCurrentUser()?.role === 'rep' ? currentUserId : null);
                if (!repId) return;
                document.querySelectorAll('.group-textarea-box').forEach(ta => {
                    const groupId = ta.dataset.groupid;
                    const content = ta.value;
                    if (!issueStore[repId]) issueStore[repId] = {};
                    if (!issueStore[repId][groupId]) issueStore[repId][groupId] = { issue: '', solution: '' };
                    const parts = content.split('\n\n---改进方案---\n');
                    issueStore[repId][groupId].issue = parts[0] || '';
                    issueStore[repId][groupId].solution = parts[1] || '';
                });
                await saveToVika(repId, markSubmitted);
            }

            function updateUI() {
                const user = ALL_USERS.find(u => u.id === currentUserId);
                roleDisplay.textContent = user.role === 'director' ? '🏢 总监' : (user.role === 'admin' ? '🔐 管理员' : (user.role === 'manager' ? '👔 SM' : '🧑‍💼 AKDM'));
                if (user.role === 'director') { renderDirectorView(); }
                else if (user.role === 'admin') { renderAdminView(); }
                else if (user.role === 'manager' && !viewingSubordinateId) { renderManagerView(user.id); }
                else { const repId = viewingSubordinateId || (user.role === 'rep' ? user.id : null); if (repId) renderRepDetailView(repId); }
                renderSelect();
            }

            function renderSelect() {
                userSelect.innerHTML = '';
                const dirOpt = document.createElement('option'); dirOpt.value = DIRECTOR.id; dirOpt.textContent = `🏢 北区总监-${DIRECTOR.name}`; if (currentUserId === DIRECTOR.id) dirOpt.selected = true; userSelect.appendChild(dirOpt);
                const adminOpt = document.createElement('option'); adminOpt.value = ADMIN.id; adminOpt.textContent = `🔐 管理员`; if (currentUserId === ADMIN.id) adminOpt.selected = true; userSelect.appendChild(adminOpt);
                MANAGERS.forEach(m => { const opt = document.createElement('option'); opt.value = m.id; opt.textContent = `👔 SM-${m.name}`; if (m.id === currentUserId && viewMode === 'manager' && !viewingSubordinateId) opt.selected = true; userSelect.appendChild(opt); });
                REPS.forEach(r => { const opt = document.createElement('option'); opt.value = r.id; opt.textContent = `🧑‍💼 AKDM-${r.name} · ${r.province}`; if (r.id === currentUserId && (viewMode === 'rep' || viewingSubordinateId)) opt.selected = true; userSelect.appendChild(opt); });
            }

            // 事件绑定
            document.getElementById('userSelect').addEventListener('change', e => {
                currentUserId = e.target.value; viewingSubordinateId = null;
                viewMode = ALL_USERS.find(u => u.id === currentUserId).role; showLevel1 = false;
                updateUI();
            });
            document.getElementById('backToTeamBtn').addEventListener('click', () => {
                if (getCurrentUser().role === 'manager') { viewingSubordinateId = null; viewMode = 'manager'; updateUI(); }
            });
            document.getElementById('resetToMyDataBtn').addEventListener('click', () => {
                const repId = viewingSubordinateId || (getCurrentUser()?.role === 'rep' ? currentUserId : null);
                if (repId && issueStore[repId]) Object.keys(issueStore[repId]).forEach(k => issueStore[repId][k] = { issue: '', solution: '' });
                updateUI();
            });
            document.getElementById('saveAllBtn').addEventListener('click', () => { saveCurrentInputs(true); });
            document.getElementById('saveDraftBtn').addEventListener('click', () => { saveCurrentInputs(false); alert('内容已暂存至云端，可继续编辑。'); });
            dynamicContent.addEventListener('input', () => {
                saveStatus.textContent = '✏️ 编辑中...';
                clearTimeout(window._autoSaveTimer);
                window._autoSaveTimer = setTimeout(() => saveCurrentInputs(false), 800);
            });

            function getCurrentUser() { return ALL_USERS.find(u => u.id === currentUserId); }

            // 初始化：先从维格表加载数据
            async function init() {
                saveStatus.textContent = '💾 正在加载云端数据...';
                await loadDataFromVika();
                renderSelect();
                updateUI();
            }

            init();
        })();
    </script>
</body>
</html>
