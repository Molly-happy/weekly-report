    function drawMicroRing(ctx, percent, color) {
        const cx=30, cy=30, r=25;
        ctx.clearRect(0,0,60,60);
        ctx.beginPath(); ctx.arc(cx,cy,r,0,2*Math.PI); ctx.strokeStyle='#e6ecf5'; ctx.lineWidth=5; ctx.stroke();
        ctx.beginPath(); ctx.arc(cx,cy,r,-0.5*Math.PI,-0.5*Math.PI+2*Math.PI*Math.min(percent,1)); ctx.strokeStyle=color; ctx.lineWidth=5; ctx.lineCap='round'; ctx.stroke();
        ctx.font='bold 12px Inter'; ctx.fillStyle='#0a1e3c'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(Math.round(percent*100)+'%', cx, cy);
    }
    function drawLineChart(canvas, data, color) {
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        const w = canvas.width, h = canvas.height;
        const pad = { top: 20, right: 30, bottom: 30, left: 40 };
        const chartW = w - pad.left - pad.right, chartH = h - pad.top - pad.bottom;
        ctx.clearRect(0, 0, w, h);
        ctx.strokeStyle = '#e6ecf5'; ctx.lineWidth = 0.5;
        for (let i = 0; i <= 3; i++) { const y = pad.top + (chartH / 3) * i; ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(w - pad.right, y); ctx.stroke(); }
        ctx.strokeStyle = '#1f4162'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(pad.left, pad.top); ctx.lineTo(pad.left, h - pad.bottom); ctx.lineTo(w - pad.right, h - pad.bottom); ctx.stroke();
        const months = ['4月', '5月', '6月'];
        const values = [data.apr, data.may, data.jun];
        const maxVal = Math.max(...values, 1) * 1.2;
        ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 2.5;
        values.forEach((v, i) => { const x = pad.left + (chartW / 2) * i; const y = h - pad.bottom - (v / maxVal) * chartH; i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); });
        ctx.stroke();
        values.forEach((v, i) => { const x = pad.left + (chartW / 2) * i; const y = h - pad.bottom - (v / maxVal) * chartH; ctx.beginPath(); ctx.arc(x, y, 4, 0, 2*Math.PI); ctx.fillStyle = color; ctx.fill(); ctx.fillStyle = '#1f4162'; ctx.font = '11px Inter'; ctx.textAlign = 'center'; ctx.fillText(v, x, y - 10); ctx.fillText(months[i], x, h - pad.bottom + 16); });
    }

    function renderManagerView(mId) {
        const sm = MANAGERS.find(m=>m.id===mId); const subs = REPS.filter(r=>r.managerId===mId);
        let html = `<div class="section-card"><div style="padding:20px 28px; display:flex;"><span style="font-weight:700;font-size:20px;">📋 SM-${sm.name} · ${sm.team}</span><button class="toggle-btn" id="toggleLevelBtn">${showLevel1?'显示汇总':'显示明细'}</button></div>`;
        html += '<div class="freeze-wrapper"><table class="data-table"><thead><tr><th style="min-width:100px;">AKDM</th><th style="min-width:60px;">省份</th>';
        smGroups.forEach(g => html += `<th style="min-width:100px;text-align:center;">${g.name}</th>`);
        html += '<th>提交</th></tr>';
        html += '<tr class="team-summary"><td colspan="2">📊 团队合计</td>';
        smGroups.forEach(g => {
            let tgt=0,act=0; subs.forEach(r => { const ach = calcGroupAchieve(r.id, g.kpis); tgt += ach.target; act += ach.actual; });
            const ta = tgt>0 ? Math.round((act/tgt)*100) : 0;
            html += `<td style="text-align:center;"><div class="progress-wrapper"><div class="progress-track"><div class="progress-fill" style="width:${Math.min(ta,100)}%;"></div></div><span>${ta}%</span></div></td>`;
        });
        html += '<td></td></tr></thead><tbody>';
        subs.forEach(rep => {
            const subm = submitStatus[rep.id]||false;
            html += `<tr class="${subm?'':'row-pending'}"><td><span class="rep-link" data-repid="${rep.id}">AKDM-${rep.name}</span></td><td>${rep.province}</td>`;
            smGroups.forEach(g => {
                const ach = calcGroupAchieve(rep.id, g.kpis);
                if (showLevel1) {
                    let cell = '<div style="display:flex; flex-direction:column; gap:8px;">';
                    if (g.bwPc) {
                        // 区分BW和PC
                        const bwIds = g.kpis.filter(id => id.startsWith('bw_'));
                        const pcIds = g.kpis.filter(id => id.startsWith('pc_'));
                        if (bwIds.length) {
                            cell += '<div style="font-weight:600; font-size:11px; color:#1e6ec5; margin-top:2px;">BW</div>';
                            bwIds.forEach(kid => {
                                const kd = getKpi(rep.id, kid);
                                const a = Math.round((kd.achieve||0)*100);
                                const nameMap = { bw_osa:'OSA', bw_facing:'Facing', bw_posm:'POSM', bw_tcp:'TCP', bw_hair_rq:'Hair RQ', bw_hair_ice:'Hair ICE' };
                                cell += `<div style="display:flex; align-items:center; gap:8px; font-size:12px;"><span style="min-width:70px;">${nameMap[kid]||kid}</span><div class="progress-track" style="width:60px;height:6px;"><div class="progress-fill" style="width:${Math.min(a,100)}%;"></div></div><span style="font-weight:600;">${a}%</span></div>`;
                            });
                        }
                        if (pcIds.length) {
                            cell += '<div style="font-weight:600; font-size:11px; color:#d32f2f; margin-top:2px;">PC</div>';
                            pcIds.forEach(kid => {
                                const kd = getKpi(rep.id, kid);
                                const a = Math.round((kd.achieve||0)*100);
                                const nameMap = { pc_osa:'OSA', pc_facing:'Facing', pc_posm:'POSM*', pc_tcp:'TCP', pc_pw_rq:'PW RQ', pc_pw_act:'PW活动' };
                                cell += `<div style="display:flex; align-items:center; gap:8px; font-size:12px;"><span style="min-width:70px;">${nameMap[kid]||kid}</span><div class="progress-track" style="width:60px;height:6px;"><div class="progress-fill" style="width:${Math.min(a,100)}%;"></div></div><span style="font-weight:600;">${a}%</span></div>`;
                            });
                        }
                    } else {
                        g.kpis.forEach(kid => {
                            const kd = getKpi(rep.id, kid);
                            const a = Math.round((kd.achieve||0)*100);
                            const nameMap = { bw_niv:'BW NIV', pc_niv:'PC NIV', bw_secondary:'BW 二级销售', pc_secondary:'PC 二级销售', bw_fifa_ppl:'BW FIFA PPL', pc_fifa_shower:'PC清扬FIFA浴露', clear_940:'Clear 940', clear_650:'Clear 650', clear_175_25:'Clear 175+25', bubble_700:'气泡700', fu_700:'馥郁700', fruit_milk:'果奶冰柚', bw_hair_quarter:'BW Hair-季活', pc_quarter:'PC-季活', contract:'包场', eb2b:'EB2B', flash_warehouse:'闪电仓' };
                            cell += `<div style="display:flex; align-items:center; gap:8px; font-size:12px;"><span style="min-width:80px;">${nameMap[kid]||kid}</span><div class="progress-track" style="width:60px;height:6px;"><div class="progress-fill" style="width:${Math.min(a,100)}%;"></div></div><span style="font-weight:600;">${a}%</span></div>`;
                        });
                    }
                    cell += '</div>';
                    html += `<td style="text-align:left;">${cell}</td>`;
                } else {
                    html += `<td style="text-align:center;"><div class="progress-wrapper"><div class="progress-track"><div class="progress-fill" style="width:${Math.min(Math.round((ach.achieve||0)*100),100)}%;"></div></div><span>${Math.round((ach.achieve||0)*100)}%</span></div></td>`;
                }
            });
            html += `<td><span class="status-badge ${subm?'status-submitted':'status-pending'}">${subm?'已提交':'未提交'}</span></td></tr>`;
        });
        html += '</tbody></table></div></div>';
        dynamicContent.innerHTML = html;
        document.getElementById('toggleLevelBtn').addEventListener('click', ()=>{ showLevel1=!showLevel1; updateUI(); });
        document.querySelectorAll('.rep-link').forEach(el=>el.addEventListener('click', e=>viewSubordinate(e.target.dataset.repid)));
        document.getElementById('saveDraftBtn').style.display='none';
    }

    function renderAdminView() {
        let html = '<div class="section-card"><div style="padding:20px 28px;">📋 管理员 · 全员提交状态</div>';
        MANAGERS.forEach(sm => {
            const subs = REPS.filter(r=>r.managerId===sm.id);
            html += `<div><strong>👔 SM-${sm.name} · ${sm.team}</strong></div>`;
            html += '<div class="freeze-wrapper"><table class="data-table"><thead><tr><th style="min-width:100px;">AKDM</th><th style="min-width:60px;">省份</th><th>提交</th>';
            smGroups.forEach(g => html += `<th style="min-width:100px;">${g.name}</th>`);
            html += '</tr></thead><tbody>';
            subs.forEach(rep => {
                const subm = submitStatus[rep.id]||false;
                html += `<tr class="${subm?'':'row-pending'}"><td><span class="rep-link" data-repid="${rep.id}">AKDM-${rep.name}</span></td><td>${rep.province}</td><td><span class="status-badge ${subm?'status-submitted':'status-pending'}">${subm?'已提交':'未提交'}</span></td>`;
                smGroups.forEach(g => {
                    const ach = calcGroupAchieve(rep.id, g.kpis);
                    html += `<td style="text-align:center;"><div class="progress-wrapper"><div class="progress-track"><div class="progress-fill" style="width:${Math.min(Math.round((ach.achieve||0)*100),100)}%;"></div></div><span>${Math.round((ach.achieve||0)*100)}%</span></div></td>`;
                });
                html += '</tr>';
            });
            html += '</tbody></table></div>';
        });
        html += '</div>';
        dynamicContent.innerHTML = html;
        document.querySelectorAll('.rep-link').forEach(el=>el.addEventListener('click', e=>viewSubordinate(e.target.dataset.repid)));
        document.getElementById('saveDraftBtn').style.display='none';
    }

    function viewSubordinate(repId) { viewingSubordinateId=repId; currentUserId=repId; viewMode='rep'; updateUI(); }
    async function saveCurrentInputs(markSubmitted=false) {
        const repId = viewingSubordinateId || (getCurrentUser()?.role==='rep'?currentUserId:null);
        if(!repId) return;
        document.querySelectorAll('.inline-textarea').forEach(ta => { const gid = ta.dataset.groupid; const content = ta.value; if(!issueStore[repId]) issueStore[repId]={}; if(!issueStore[repId][gid]) issueStore[repId][gid]={issue:'',solution:''}; const parts = content.split('\n\n---改进方案---\n'); issueStore[repId][gid].issue = parts[0]||''; issueStore[repId][gid].solution = parts[1]||''; });
        try { await saveToVika(repId, markSubmitted); showToast(markSubmitted?'✅ 已提交至云端':'💾 已暂存至云端', markSubmitted?'#2e7d32':'#1565c0'); } catch(e) { showToast('❌ 保存失败，请重试','#d32f2f'); }
    }
    function updateUI() {
        const user = ALL_USERS.find(u=>u.id===currentUserId);
        if(!user) return;
        roleDisplay.textContent = user.role==='director'?'🏢 总监':(user.role==='admin'?'🔐 管理员':(user.role==='manager'?'👔 SM':'🧑‍💼 AKDM'));
        if (user.role==='director') renderDirectorView();
        else if (user.role==='admin') renderAdminView();
        else if (user.role==='manager' && !viewingSubordinateId) renderManagerView(user.id);
        else { const rid=viewingSubordinateId||(user.role==='rep'?user.id:null); if(rid) renderRepDetailView(rid); }
        renderSelect();
    }
    function renderSelect() {
        userSelect.innerHTML = '';
        ALL_USERS.forEach(u => {
            const o = document.createElement('option'); o.value=u.id;
            if (u.role==='director') o.textContent=`🏢 北区总监-${u.name}`;
            else if (u.role==='admin') o.textContent='🔐 管理员';
            else if (u.role==='manager') o.textContent=`👔 SM-${u.name} · ${u.team}`;
            else o.textContent=`🧑‍💼 AKDM-${u.name} · ${u.province}`;
            if (u.id===currentUserId && !viewingSubordinateId) o.selected=true;
            userSelect.appendChild(o);
        });
    }
    document.getElementById('userSelect').addEventListener('change', e => { currentUserId = e.target.value; viewingSubordinateId=null; viewMode = ALL_USERS.find(u=>u.id===currentUserId).role; showLevel1=false; updateUI(); });
    document.getElementById('backToTeamBtn').addEventListener('click', ()=>{ if (getCurrentUser().role==='manager') { viewingSubordinateId=null; viewMode='manager'; updateUI(); } });
    document.getElementById('resetToMyDataBtn').addEventListener('click', ()=>{ const rid = viewingSubordinateId || (getCurrentUser()?.role==='rep'?currentUserId:null); if (rid && issueStore[rid]) Object.keys(issueStore[rid]).forEach(k=>issueStore[rid][k]={issue:'',solution:''}); updateUI(); });
    document.getElementById('saveAllBtn').addEventListener('click', ()=>saveCurrentInputs(true));
    document.getElementById('saveDraftBtn').addEventListener('click', ()=>saveCurrentInputs(false));
    dynamicContent.addEventListener('input', ()=>{ clearTimeout(window._st); window._st = setTimeout(()=>saveCurrentInputs(false), 800); });
    function getCurrentUser() { return ALL_USERS.find(u=>u.id===currentUserId); }
    async function init() { saveStatus.textContent='💾 正在加载云端数据...'; await loadDataFromVika(); renderSelect(); updateUI(); }
    init();
})();
</script>
</body>
</html>
